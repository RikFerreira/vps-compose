name: vps-deploy
on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      SERVER_NAME: ${{ secrets.SERVER_NAME }}
      SERVER_NAME_WWW: ${{ secrets.SERVER_NAME_WWW }}
      LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Render runtime .env
        run: |
          test -n "$POSTGRES_USER"
          test -n "$POSTGRES_PASSWORD"
          test -n "$POSTGRES_DB"
          test -n "$SERVER_NAME"
          test -n "$SERVER_NAME_WWW"
          test -n "$LETSENCRYPT_EMAIL"

          mkdir -p certbot/conf certbot/www

          {
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'SERVER_NAME=%s\n' "$SERVER_NAME"
            printf 'SERVER_NAME_WWW=%s\n' "$SERVER_NAME_WWW"
            printf 'LETSENCRYPT_EMAIL=%s\n' "$LETSENCRYPT_EMAIL"
          } > .env

          chmod 600 .env

      - name: Update git submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git config --file .gitmodules --get-regexp 'submodule\..*\.path' \
            | awk '{print $2}' \
            | grep '^services/' \
            | while read path; do
                git submodule update --remote "$path"
                git -C "$path" submodule sync --recursive
                git -C "$path" submodule update --init --recursive
              done

      - name: Ensure SSL certificates
        run: |
          if [ ! -f "certbot/conf/live/${SERVER_NAME}/fullchain.pem" ]; then
            # Swap in HTTP-only bootstrap config so nginx can start without certs
            cp nginx/servers-bootstrap.conf nginx/servers.conf
            trap 'git checkout -- nginx/servers.conf' EXIT

            # Start nginx alone (no deps — blog not needed for ACME challenge)
            docker compose up -d --no-deps nginx
            sleep 5

            # Obtain certificate via webroot
            docker compose run --rm certbot certonly --webroot \
              -w /var/www/certbot \
              -d "$SERVER_NAME" -d "$SERVER_NAME_WWW" \
              --email "$LETSENCRYPT_EMAIL" --agree-tos --no-eff-email \
              --non-interactive
          fi

      - name: Deploy
        run: docker compose up -d --build --force-recreate
