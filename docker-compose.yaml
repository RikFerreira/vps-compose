services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public
    depends_on:
      - postgis
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  # ARM64 version
  postgis:
    image: kartoza/postgis:18.4-3.6.3--v2026.05.21
    container_name: postgis
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data   
    networks:
      - private

volumes:
  postgis_data:
    driver: local

networks:
  public:
    driver: bridge
  private:
    driver: bridge